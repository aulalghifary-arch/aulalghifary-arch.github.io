    <!-- Pengunjung kami adalah salah satu prioritas utama kami. Dokumen Kebijakan Privasi ini berisi jenis informasi yang dikumpulkan dan dicatat oleh Narasi Akar serta bagaimana kami menggunakannya.

​1. Informasi yang Kami Kumpulkan

Jika Anda menggunakan aplikasi atau layanan kami yang terhubung dengan situs ini, kami tidak mengumpulkan informasi pribadi seperti nama, alamat, atau nomor telepon, kecuali jika Anda secara sukarela memberikannya (misalnya melalui kolom komentar atau formulir kontak).

​2. File Log (Log Files)

Narasi Akar mengikuti prosedur standar menggunakan file log. File-file ini mencatat pengunjung ketika mereka mengunjungi situs web. Informasi yang dikumpulkan oleh file log termasuk alamat protokol internet (IP), jenis browser, Penyedia Layanan Internet (ISP), stempel tanggal dan waktu, halaman perujukan/keluar, dan mungkin jumlah klik. Ini tidak terkait dengan informasi apa pun yang dapat diidentifikasi secara pribadi.

​3. Cookie dan Web Beacon

Seperti situs web lainnya, Narasi Akar menggunakan 'cookies'. Cookie digunakan untuk menyimpan informasi termasuk preferensi pengunjung, dan halaman-halaman di situs web yang diakses atau dikunjungi pengunjung. Informasi tersebut digunakan untuk mengoptimalkan pengalaman pengguna.

​4. Persetujuan

Dengan menggunakan situs web atau aplikasi kami, Anda dengan ini menyetujui Kebijakan Privasi kami dan menyetujui syarat dan ketentuannya. -->
